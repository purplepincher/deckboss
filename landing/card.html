<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeckBoss – Social Preview</title>
  <style>
    *,::after,::before{box-sizing:border-box}
    body {
      margin:0;
      overflow:hidden;
      background:#0a1628;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width:1200px;
      height:630px;
      display:flex;
      background:#0a1628;
      color:#e8edf5;
      overflow:hidden;
    }
    .text {
      flex:1;
      padding:60px 50px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .text h1 {
      font-size: 90px;
      margin:0 0 30px;
      font-weight: 700;
      letter-spacing:-0.02em;
    }
    .text p {
      font-size: 36px;
      margin:0;
      line-height:1.2;
    }
    .image {
      width:50%;
      height:100%;
      overflow:hidden;
    }
    .image img {
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:right;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text">
      <h1>DeckBoss</h1>
      <p>Voice-first fishing log.<br>No signal needed. Free.</p>
    </div>
    <div class="image">
      <img src="../landing-assets/screenshot-record.png" alt="">
    </div>
  </div>
</body>
</html>
