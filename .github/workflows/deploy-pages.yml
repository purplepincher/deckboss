name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      # Project-repo Pages URL is https://<org>.github.io/deckboss/ until a
      # custom domain is added — see vite.config.ts's BASE_PATH handling.
      # Delete this env line once CNAME/custom domain is configured.
      - run: npm run build
        env:
          BASE_PATH: /deckboss/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
